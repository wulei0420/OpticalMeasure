<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>OpticalMeasure V3</title>
<link rel="stylesheet" href="/static/v2/app.css">
</head>
<body>

<!-- ====== 待机页 ====== -->
<div id="home" class="view active">
  <div class="home-brand">
    <h1>OpticalMeasure</h1>
    <p class="sub">AI个化验配<br>数字定位系统</p>
  </div>
  <div class="home-center">
    <div class="cust-box">
      <input id="homeSearch" placeholder="客户姓名或电话后四位..." autocomplete="off" oninput="homeSearch()">
      <div id="homeSearchResult"></div>
    </div>
    <button class="btn-p" onclick="homeStart()">开始测量</button>
    <button class="btn-s" onclick="homeHistory()">查看历史</button>
  </div>
</div>

<!-- ====== 拍照页 ====== -->
<div id="cap" class="view">
  <div class="cap-topbar">
    <span id="capTitle">拍摄正面</span>
    <button class="btn-t" onclick="goHome()" style="margin-left:auto">返回首页</button>
  </div>
  <div class="cap-body" id="capBody">
    <div id="previewBox" class="preview-box">
      <video id="previewVid" autoplay playsinline muted style="display:none"></video>
      <img id="prevCenter" src="" style="display:none;width:100%;height:100%;object-fit:contain">
      <canvas id="capCanvas"></canvas>
      <div class="cap-mask"></div>
      <div class="cap-actions">
        <button id="capBack" class="btn-t" onclick="capBack()" style="display:none">返回</button>
        <button id="btnShoot" class="btn-p" onclick="capShoot()" style="display:none">拍摄</button>
        <button id="capSkip" class="btn-t" onclick="capSkip()" style="display:none">跳过侧面</button>
        <button id="capNext" class="btn-t" onclick="capNext()" style="display:none">继续拍摄侧面</button>
        <button id="btnRetake" class="btn-s" onclick="capRetake()" style="display:none">重新拍摄</button>
      </div>
    </div>
  </div>
</div>

<!-- ====== 标注页 ====== -->
<div id="annot" class="view">
  <div class="annot-topbar">
    <span id="annotTitle">标注正面</span>
    <button class="btn-t" onclick="goHome()" style="margin-left:auto">返回首页</button>
  </div>
  <div class="annot-body">
    <div class="annot-canvas-wrap">
      <canvas id="annotCanvas"></canvas>
    </div>
    <div class="annot-actions">
      <button id="annotBack" class="btn-t" onclick="annotBack()" style="display:none">返回</button>
      <button id="annotSkip" class="btn-t" onclick="annotSkip()" style="display:none">跳过侧面</button>
      <button id="annotNext" class="btn-t" onclick="annotNext()" style="display:none">下一步</button>
      <button id="annotDone" class="btn-t" onclick="annotDone()" style="display:none">完成</button>
      <button id="annotUndo" class="btn-t" onclick="annotUndo()">撤销</button>
    </div>
    <div class="annot-hint" id="annotHint">Step 1/4: 点击右瞳孔</div>
    <div id="mg" style="display:none;position:fixed;width:150px;height:150px;border-radius:50%;border:2px solid rgba(241,196,15,.6);pointer-events:none;z-index:999;overflow:hidden">
      <canvas id="mgc" width=300 height=300></canvas>
    </div>
  </div>
</div>

<!-- ====== 报告页 ====== -->
<div id="rpt" class="view">
  <div class="rpt-topbar">
    <span>OpticalMeasure测量报告</span>
    <div class="topbar-r">
      <button class="btn-t" onclick="rptPrint()">打印</button>
      <button class="btn-t" onclick="goHome()">返回首页</button>
    </div>
  </div>
  <div class="rpt-body" id="rptBody"></div>
</div>

<!-- ====== 历史页 ====== -->
<div id="hist" class="view">
  <div class="topbar">
    <span>客户历史</span>
    <div class="topbar-r">
      <button class="btn-t" onclick="goHome()">返回首页</button>
    </div>
  </div>
  <div class="hist-body" id="histBody">
    <input id="histSearch" placeholder="搜索客户..." oninput="histSearch()">
    <div id="histList"></div>
  </div>
</div>

<div id=saveCustModal style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center">
  <div style="background:#1a1a1a;border:1px solid #30363d;border-radius:8px;padding:20px;min-width:340px;max-width:400px">
    <div style="color:#f0ad4e;font-weight:bold;margin-bottom:12px">保存到客户</div>
    <input id=scmSearch placeholder="搜索客户姓名或电话..." style="width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;color:#ccc;border-radius:4px;margin-bottom:8px;font-size:13px" oninput="scmSearch()">
    <div id=scmList style="max-height:200px;overflow-y:auto;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px;margin-bottom:6px">
      <input id=scmNew placeholder="新客户姓名" style="flex:1;padding:6px 10px;background:#0d1117;border:1px solid #30363d;color:#ccc;border-radius:4px;font-size:13px">
      <input id=scmPhone placeholder="电话(可选)" style="flex:1;padding:6px 10px;background:#0d1117;border:1px solid #30363d;color:#ccc;border-radius:4px;font-size:13px">
    </div>
    <button onclick="scmCreate()" style="background:#3fb950;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:13px;width:100%;margin-bottom:8px">新建</button>
    <button onclick="scmClose()" style="background:transparent;border:1px solid #555;color:#888;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;margin-top:12px;width:100%">取消</button>
  </div>
</div>

<script src="/static/v2/app.js"></script>
</body>
</html>
